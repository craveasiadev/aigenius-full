# =====================================================================
# Aigenius — single-origin nginx routing
# ---------------------------------------------------------------------
#   /                 → React SPA  (frontend dist)
#   /api/...          → Laravel    (prefix stripped — routes live in web.php)
#   /storage/...      → Laravel public storage (uploads / shop images)
#   /aipreneur/...    → Laravel    (controller URIs — no strip)
#   /aigenius/...     → Laravel
#   /reward-images/   → Laravel
#   /sanctum/...      → Laravel
#   /fiuu-*.php       → Laravel public PHP callbacks
#   *.php (root only) → Laravel public PHP
# =====================================================================

upstream php_upstream {
    server app:9000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Real client IP behind reverse proxies (Cloudflare, VPS LB, etc.)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # ------------------------------------------------------------------
    # Laravel public root — used for /api, /storage, *.php
    # ------------------------------------------------------------------
    root /var/www/frontend;
    index index.html;

    # Frontend long-cache for hashed assets (Vite emits content-hashed files)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Laravel's own Vite build output (Blade superadmin uses these)
    location ^~ /build/ {
        root /var/www/backend/public;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # API: /api/* → Laravel root (strip prefix)
    # ---
    # Laravel reads $_SERVER['REQUEST_URI'] to route, and the default
    # `fastcgi_param REQUEST_URI $request_uri;` in /etc/nginx/fastcgi_params
    # sends the ORIGINAL URI (i.e. still "/api/foo"). So even though we
    # rewrite the path for try_files, Laravel still sees "/api/" and 404s.
    #
    # Fix: rewrite, then override REQUEST_URI to the stripped $uri so
    # the router gets the path it actually has a route for.
    # ------------------------------------------------------------------
    location ^~ /api/ {
        rewrite ^/api(/.*)$ $1 break;

        root /var/www/backend/public;

        # No file matches (Laravel handles everything) — fastcgi straight to index.php
        fastcgi_pass  php_upstream;
        fastcgi_index index.php;
        include       /etc/nginx/fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $uri$is_args$args;
        fastcgi_param DOCUMENT_URI    $uri;
        fastcgi_param HTTPS           $https if_not_empty;
        fastcgi_param HTTP_PROXY      "";
        fastcgi_keep_conn on;
    }

    # Bare /api (no slash) — redirect to /api/ so the location above handles it
    location = /api {
        return 308 /api/;
    }

    # ------------------------------------------------------------------
    # Public uploaded files — served straight from the shared volume,
    # never going through PHP. Mirrors `public/storage -> storage/app/public`
    # without needing the artisan-created symlink to exist in nginx's image.
    # ------------------------------------------------------------------
    location ^~ /storage/ {
        alias /var/www/backend/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # Laravel direct paths (no strip)
    #   superadmin/admin → server-rendered Blade admin panel
    #   aipreneur/aigenius/etc → JSON controllers
    # ------------------------------------------------------------------
    location ~ ^/(superadmin|admin|aipreneur|aigenius|reward-images|sanctum|livewire|_ignition|up|payment-callback|wpay|otp|password) {
        root /var/www/backend/public;
        try_files $uri /index.php?$query_string;
    }

    # Fiuu callbacks ship as standalone PHP files in Laravel public/
    location ~ ^/fiuu-(callback|return|test)\.php$ {
        root /var/www/backend/public;
        fastcgi_pass php_upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include /etc/nginx/fastcgi_params;
    }

    # ------------------------------------------------------------------
    # PHP execution — Laravel index.php and any *.php in Laravel public
    # ------------------------------------------------------------------
    location ~ \.php$ {
        root /var/www/backend/public;
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass  php_upstream;
        fastcgi_index index.php;

        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        fastcgi_param HTTPS            $https if_not_empty;
        fastcgi_param HTTP_PROXY       "";

        fastcgi_keep_conn on;
    }

    # ------------------------------------------------------------------
    # Health checks (cheap, no PHP)
    # ------------------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ------------------------------------------------------------------
    # SPA fallback — anything else loads index.html
    # index.html must never be cached so browsers always fetch the
    # latest shell on reload (Vite hashes the JS/CSS, so stale index
    # pointing at old hashes is the only way to get a "stuck" build).
    # ------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
