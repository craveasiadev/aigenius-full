; PHP-FPM pool tuned for a small/medium VPS
[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000
listen.backlog = 1024

; dynamic process manager — scales with load
pm = dynamic
pm.max_children = 40
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12
pm.max_requests = 500
pm.process_idle_timeout = 30s

; Log slow requests for tuning later
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

; Send PHP errors to stderr so docker logs picks them up
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; Status endpoint (useful for monitoring)
pm.status_path = /fpm-status
ping.path = /fpm-ping
