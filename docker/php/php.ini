; Production-tuned PHP settings for Laravel
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000
default_socket_timeout = 60

; Realpath cache — huge speedup for autoloader-heavy frameworks
realpath_cache_size = 16M
realpath_cache_ttl = 600

; Tight session + safer defaults
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Errors: log, don't expose
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Timezone — keep in sync with APP_TIMEZONE
date.timezone = Asia/Kuala_Lumpur
